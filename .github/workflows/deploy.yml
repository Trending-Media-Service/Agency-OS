name: Cloud Run CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: aos-control-plane-tmg
  REGION: asia-south1
  SERVICE_NAME: agency-os-backend
  FRONTEND_SERVICE: agency-os-web
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/aos-control-plane-tmg/agency-os/control-plane
  WEB_ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/aos-control-plane-tmg/agency-os/control-plane-web
  CLOUDSQL_INSTANCE: aos-control-plane-tmg:asia-south1:aos-db
  STATE_BUCKET: aos-tfstate-tmg
  OUTBOX_QUEUE: aos-outbox
  APP_URL: https://agency-os-backend-730671240713.asia-south1.run.app
  # NOTE: 730671240713 is the project NUMBER of aos-control-plane-tmg.
  # Verify with: gcloud projects describe aos-control-plane-tmg --format='value(projectNumber)'
  WIP_PROVIDER: projects/730671240713/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: deploy-cloudrun@aos-control-plane-tmg.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIP_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          # Terraform recipes live at the repo root, but the Dockerfile builds from the
          # control-plane/ context. Stage them in first (mirrors deploy.sh), clean up after.
          cp -r recipes control-plane/recipes
          trap 'rm -rf control-plane/recipes' EXIT
          docker build \
            -t "${ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            -t "${ARTIFACT_REGISTRY}:latest" \
            ./control-plane
          docker push "${ARTIFACT_REGISTRY}:${GITHUB_SHA}"
          docker push "${ARTIFACT_REGISTRY}:latest"

      - name: Resolve frontend URLs for CORS
        id: cors
        run: |
          # Cloud Run assigns each service two URL forms (numeric + hash-based).
          # Read both from the service annotation to allow either access form.
          FRONTEND_URLS_JSON=$(gcloud run services describe "${FRONTEND_SERVICE}" \
            --platform managed --region "${REGION}" \
            --format="value(metadata.annotations.\"run.googleapis.com/urls\")" \
            --project "${PROJECT_ID}" 2>/dev/null || true)

          if [ -n "${FRONTEND_URLS_JSON}" ] && [ "${FRONTEND_URLS_JSON}" != "null" ]; then
            # Convert ["url1","url2",...] to url1,url2,...
            FRONTEND_URLS=$(echo "${FRONTEND_URLS_JSON}" | tr -d '[]"' | tr '\n' ',' | sed 's/,$//')
            echo "allowed_origins=${FRONTEND_URLS},http://localhost:3000" >> "${GITHUB_OUTPUT}"
          else
            # Fallback to single status.url if annotation is unavailable
            FRONTEND_URL=$(gcloud run services describe "${FRONTEND_SERVICE}" \
              --platform managed --region "${REGION}" \
              --format="value(status.url)" --project "${PROJECT_ID}" 2>/dev/null || true)
            if [ -n "${FRONTEND_URL}" ] && [ "${FRONTEND_URL}" != "null" ]; then
              echo "allowed_origins=${FRONTEND_URL},http://localhost:3000" >> "${GITHUB_OUTPUT}"
            else
              echo "allowed_origins=http://localhost:3000" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "${SERVICE_NAME}" \
            --image "${ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --quiet \
            --set-env-vars="^###^ALLOWED_ORIGINS=${{ steps.cors.outputs.allowed_origins }}###ENV=production###GCP_PROJECT=${PROJECT_ID}###GCP_LOCATION=${REGION}###AOS_STATE_BUCKET=${STATE_BUCKET}###OUTBOX_QUEUE_NAME=${OUTBOX_QUEUE}###APP_URL=${APP_URL}" \
            --set-secrets="DATABASE_URL=aos-database-url:latest,WORKER_DATABASE_URL=aos-worker-database-url:latest,OPERATOR_TOKEN=aos-operator-token:latest,WHATSAPP_APP_SECRET=whatsapp-app-secret:latest,WHATSAPP_VERIFY_TOKEN=whatsapp-verify-token:latest" \
            --add-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --memory 2Gi

  deploy-web:
    name: Deploy Console to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIP_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Resolve backend URL
        id: backend
        run: |
          # The console bakes NEXT_PUBLIC_API_URL in at build time, so resolve the
          # live backend URL (mirrors deploy_web.sh), falling back to APP_URL.
          BACKEND_URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --platform managed --region "${REGION}" \
            --format="value(status.url)" --project "${PROJECT_ID}" 2>/dev/null || true)
          if [ -z "${BACKEND_URL}" ] || [ "${BACKEND_URL}" = "null" ]; then
            BACKEND_URL="${APP_URL}"
          fi
          echo "url=${BACKEND_URL}" >> "${GITHUB_OUTPUT}"

      - name: Build and Push Console Container
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.backend.outputs.url }}" \
            -t "${WEB_ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            -t "${WEB_ARTIFACT_REGISTRY}:latest" \
            ./control-plane/web
          docker push "${WEB_ARTIFACT_REGISTRY}:${GITHUB_SHA}"
          docker push "${WEB_ARTIFACT_REGISTRY}:latest"

      - name: Deploy Console to Cloud Run
        run: |
          gcloud run services update "${FRONTEND_SERVICE}" \
            --image "${WEB_ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --quiet
