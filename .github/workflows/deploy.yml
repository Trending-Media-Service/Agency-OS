name: Cloud Run CD

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: aos-control-plane-tmg
  REGION: asia-south1
  SERVICE_NAME: agency-os-backend
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/aos-control-plane-tmg/agency-os/control-plane
  # NOTE: 730671240713 must be the project NUMBER of aos-control-plane-tmg.
  # Verify with: gcloud projects describe aos-control-plane-tmg --format='value(projectNumber)'
  WIP_PROVIDER: projects/730671240713/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: deploy-cloudrun@aos-control-plane-tmg.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIP_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }} -t ${{ env.ARTIFACT_REGISTRY }}:latest ./control-plane
          docker push ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --max-instances=10
            --memory=1Gi
            --cpu=1
