name: Cloud Run CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: aos-control-plane-tmg
  REGION: asia-south1
  SERVICE_NAME: agency-os-backend
  FRONTEND_SERVICE: agency-os-web
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/aos-control-plane-tmg/agency-os/control-plane
  WEB_ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev/aos-control-plane-tmg/agency-os/control-plane-web
  DATABASE_URL_SECRET: aos-database-url
  CLOUDSQL_INSTANCE: aos-control-plane-tmg:asia-south1:aos-db
  STATE_BUCKET: aos-tfstate-tmg
  OUTBOX_QUEUE: aos-outbox
  APP_URL: https://agency-os-backend-730671240713.asia-south1.run.app
  # NOTE: 730671240713 is the project NUMBER of aos-control-plane-tmg.
  # Verify with: gcloud projects describe aos-control-plane-tmg --format='value(projectNumber)'
  WIP_PROVIDER: projects/730671240713/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: deploy-cloudrun@aos-control-plane-tmg.iam.gserviceaccount.com
  WORKER_SA: aos-worker@aos-control-plane-tmg.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIP_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          # Terraform recipes live at the repo root, but the Dockerfile builds from the
          # control-plane/ context. Stage them in first (mirrors deploy.sh), clean up after.
          cp -r recipes control-plane/recipes
          trap 'rm -rf control-plane/recipes' EXIT
          docker build \
            -t "${ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            -t "${ARTIFACT_REGISTRY}:latest" \
            ./control-plane
          docker push "${ARTIFACT_REGISTRY}:${GITHUB_SHA}"
          docker push "${ARTIFACT_REGISTRY}:latest"

      - name: Run Database Migrations (Gated)
        run: |
          set -euo pipefail

          echo "Resolving the backend runtime service account for migrations..."
          BACKEND_RUNTIME_SA=$(gcloud run services describe "${SERVICE_NAME}" \
            --platform managed \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format="value(spec.template.spec.serviceAccountName)" 2>/dev/null || true)
          if [ -z "${BACKEND_RUNTIME_SA}" ] || [ "${BACKEND_RUNTIME_SA}" = "null" ]; then
            BACKEND_RUNTIME_SA="${WORKER_SA}"
          fi

          SAFE_SERVICE_NAME=$(printf '%s' "${SERVICE_NAME}" | tr '[:upper:]_' '[:lower:]-' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')
          MIGRATION_JOB_BASE="${SAFE_SERVICE_NAME:-svc}-migrate-${GITHUB_SHA::7}"
          MIGRATION_JOB=$(printf '%s' "${MIGRATION_JOB_BASE}" | cut -c1-63 | sed -E 's/-+$//')
          trap 'gcloud run jobs delete "${MIGRATION_JOB}" --region "${REGION}" --project "${PROJECT_ID}" --quiet >/dev/null 2>&1 || true' EXIT

          echo "Deploying one-off migration job ${MIGRATION_JOB}..."
          # The runtime image copies control-plane/migrate.py to /app/migrate.py.
          gcloud run jobs deploy "${MIGRATION_JOB}" \
            --image "${ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --service-account "${BACKEND_RUNTIME_SA}" \
            --set-secrets="DATABASE_URL=${DATABASE_URL_SECRET}:latest" \
            --set-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --command=python3 \
            --args=/app/migrate.py \
            --max-retries=0 \
            --task-timeout=10m \
            --quiet

          echo "Executing migration job..."
          gcloud run jobs execute "${MIGRATION_JOB}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --wait

      - name: Resolve frontend URLs for CORS
        id: cors
        run: |
          # Cloud Run assigns each service two URL forms (numeric + hash-based).
          # Read both from the service annotation to allow either access form.
          FRONTEND_URLS_JSON=$(gcloud run services describe "${FRONTEND_SERVICE}" \
            --platform managed --region "${REGION}" \
            --format="value(metadata.annotations.\"run.googleapis.com/urls\")" \
            --project "${PROJECT_ID}" 2>/dev/null || true)

          if [ -n "${FRONTEND_URLS_JSON}" ] && [ "${FRONTEND_URLS_JSON}" != "null" ]; then
            # Convert ["url1","url2",...] to url1,url2,...
            FRONTEND_URLS=$(echo "${FRONTEND_URLS_JSON}" | tr -d '[]"' | tr '\n' ',' | sed 's/,$//')
            echo "allowed_origins=${FRONTEND_URLS},http://localhost:3000" >> "${GITHUB_OUTPUT}"
          else
            # Fallback to single status.url if annotation is unavailable
            FRONTEND_URL=$(gcloud run services describe "${FRONTEND_SERVICE}" \
              --platform managed --region "${REGION}" \
              --format="value(status.url)" --project "${PROJECT_ID}" 2>/dev/null || true)
            if [ -n "${FRONTEND_URL}" ] && [ "${FRONTEND_URL}" != "null" ]; then
              echo "allowed_origins=${FRONTEND_URL},http://localhost:3000" >> "${GITHUB_OUTPUT}"
            else
              echo "allowed_origins=http://localhost:3000" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Resolve runtime secrets
        id: secrets
        run: |
          set -euo pipefail
          # Base platform secrets (always provisioned).
          SECRETS="DATABASE_URL=${DATABASE_URL_SECRET}:latest,WORKER_DATABASE_URL=aos-worker-database-url:latest,OPERATOR_TOKEN=aos-operator-token:latest,WHATSAPP_APP_SECRET=whatsapp-app-secret:latest,WHATSAPP_VERIFY_TOKEN=whatsapp-verify-token:latest"
          # Optional runtime secrets — OAuth app credentials (read as env vars by
          # app/services/oauth_registry.py) plus SECRET_KEY (HMAC key signing the OAuth
          # state in app/services/oauth.py). Each is injected ONLY if the Secret Manager
          # secret exists, so an unprovisioned one is skipped (insecure/mock fallback)
          # rather than failing the deploy. Provision via ./load_credentials.sh.
          declare -A OPTIONAL_SECRETS=(
            [SECRET_KEY]=aos-oauth-state-secret
            [GOOGLE_ADS_CLIENT_ID]=google-ads-client-id
            [GOOGLE_ADS_CLIENT_SECRET]=google-ads-client-secret
            [META_ADS_CLIENT_ID]=meta-ads-client-id
            [META_ADS_CLIENT_SECRET]=meta-ads-client-secret
            [SHOPIFY_CLIENT_ID]=shopify-client-id
            [SHOPIFY_CLIENT_SECRET]=shopify-client-secret
          )
          for env_name in "${!OPTIONAL_SECRETS[@]}"; do
            secret_name="${OPTIONAL_SECRETS[$env_name]}"
            if gcloud secrets describe "${secret_name}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
              SECRETS="${SECRETS},${env_name}=${secret_name}:latest"
              echo "wired ${env_name} <- ${secret_name}"
            else
              echo "skip  ${env_name} (secret ${secret_name} not found; using mock fallback)"
            fi
          done
          echo "value=${SECRETS}" >> "${GITHUB_OUTPUT}"

      - name: Deploy to Cloud Run (Canary)
        run: |
          gcloud run services update "${SERVICE_NAME}" \
            --image "${ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --quiet \
            --no-traffic \
            --tag=canary \
            --set-env-vars="^###^ALLOWED_ORIGINS=${{ steps.cors.outputs.allowed_origins }}###ENV=production###GCP_PROJECT=${PROJECT_ID}###GCP_LOCATION=${REGION}###AOS_STATE_BUCKET=${STATE_BUCKET}###OUTBOX_QUEUE_NAME=${OUTBOX_QUEUE}###APP_URL=${APP_URL}###AOS_WORKER_SERVICE_ACCOUNT=${{ env.WORKER_SA }}" \
            --set-secrets="${{ steps.secrets.outputs.value }}" \
            --add-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --memory 2Gi

      - name: Post-deploy smoke test (Canary)
        run: |
          set -euo pipefail
          
          echo "Resolving Canary Revision URL..."
          BASE=$(gcloud run services describe "${SERVICE_NAME}" \
            --platform managed --region "${REGION}" --project "${PROJECT_ID}" \
            --format=json | jq -r '.status.traffic[] | select(.tag=="canary") | .url')
          
          if [ -z "${BASE}" ] || [ "${BASE}" = "null" ]; then
            echo "::error::Failed to resolve Canary Revision URL!"
            exit 1
          fi
          echo "Smoke-testing Canary at ${BASE}"

          # 1. Readiness (also confirms the app booted with its prod config + DB)
          code=$(curl -sS -o /dev/null -w '%{http_code}' --retry 5 --retry-all-errors \
            --retry-delay 3 "${BASE}/readyz")
          [ "$code" = "200" ] || { echo "::error::/readyz returned $code"; exit 1; }

          # 2. CORS preflight must allow the console origin (regression guard for the
          #    URL-form mismatch that caused 'Failed to fetch').
          ORIGIN=$(gcloud run services describe "${FRONTEND_SERVICE}" --platform managed \
            --region "${REGION}" --project "${PROJECT_ID}" --format="value(status.url)" 2>/dev/null || true)
          if [ -n "${ORIGIN}" ] && [ "${ORIGIN}" != "null" ]; then
            allow=$(curl -sS -D - -o /dev/null -X OPTIONS "${BASE}/tenants" \
              -H "Origin: ${ORIGIN}" -H "Access-Control-Request-Method: POST" \
              | grep -i "access-control-allow-origin" || true)
            echo "preflight allow-origin: ${allow:-<none>}"
            [ -n "${allow}" ] || { echo "::error::CORS preflight did not allow ${ORIGIN}"; exit 1; }
          fi

          # 3. POST /tenants must be reachable + auth-gated (401), NOT a 500/crash.
          #    (The create_tenant DB write path is covered by the Postgres RLS test in CI.)
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "${BASE}/tenants" \
            -H "Content-Type: application/json" -d '{"name":"smoke","brand_name":"smoke"}')
          [ "$code" = "401" ] || { echo "::error::POST /tenants (no token) returned $code, expected 401"; exit 1; }

          echo "Smoke test passed."

      - name: Shift Traffic to New Revision
        run: |
          echo "Smoke tests passed. Shifting 100% of production traffic to the new revision..."
          gcloud run services update-traffic "${SERVICE_NAME}" \
            --to-revisions=LATEST=100 \
            --platform managed \
            --region "${REGION}" \
            --project "${PROJECT_ID}"

      - name: Provision Cloud Scheduler Jobs
        run: |
          echo "Provisioning Cloud Scheduler Jobs..."
          chmod +x control-plane/scripts/provision_scheduler.sh
          ./control-plane/scripts/provision_scheduler.sh
        env:
          GCP_PROJECT: ${{ env.PROJECT_ID }}
          GCP_LOCATION: ${{ env.REGION }}
          AOS_WORKER_SERVICE_ACCOUNT: ${{ env.WORKER_SA }}
          APP_URL: ${{ env.APP_URL }}

  deploy-web:
    name: Deploy Console to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIP_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Resolve backend URL
        id: backend
        run: |
          # The console bakes NEXT_PUBLIC_API_URL in at build time, so resolve the
          # live backend URL (mirrors deploy_web.sh), falling back to APP_URL.
          BACKEND_URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --platform managed --region "${REGION}" \
            --format="value(status.url)" --project "${PROJECT_ID}" 2>/dev/null || true)
          if [ -z "${BACKEND_URL}" ] || [ "${BACKEND_URL}" = "null" ]; then
            BACKEND_URL="${APP_URL}"
          fi
          echo "url=${BACKEND_URL}" >> "${GITHUB_OUTPUT}"

      - name: Build and Push Console Container
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.backend.outputs.url }}" \
            -t "${WEB_ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            -t "${WEB_ARTIFACT_REGISTRY}:latest" \
            ./control-plane/web
          docker push "${WEB_ARTIFACT_REGISTRY}:${GITHUB_SHA}"
          docker push "${WEB_ARTIFACT_REGISTRY}:latest"

      - name: Deploy Console to Cloud Run
        run: |
          gcloud run services update "${FRONTEND_SERVICE}" \
            --image "${WEB_ARTIFACT_REGISTRY}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --quiet
