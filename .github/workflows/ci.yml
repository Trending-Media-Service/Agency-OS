# Place at: .github/workflows/ci.yml
# This check + branch protection is what makes agent PRs safe to merge.
name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agency_os
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agency_os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          pip install pip-audit
          pip install -r control-plane/requirements.txt
      - name: Security audit (pip-audit)
        run: pip-audit -r control-plane/requirements.txt
      - name: Kernel test suite
        run: cd control-plane && python -m pytest
      - name: Invariant checks
        run: |
          set -e
          if [ -d google3 ]; then echo "::error::google3/ path recreated — forbidden (AGENTS.md)"; exit 1; fi
          if grep -rEn "ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{30,}|-----BEGIN (RSA |EC )?PRIVATE KEY" \
               --include="*.py" --include="*.yaml" --include="*.yml" --include="*.tf" --include="*.json" --include="*.md" \
               --exclude-dir=.git . ; then
            echo "::error::credential-like string committed — forbidden (AGENTS.md)"; exit 1
          fi
          # Flag raw credential variables interpolated into logger/print (must NOT flag safe secret_ref or conn.credential)
          if grep -rPn "(logger\.\w+|print)\s*\(.*\{[^}]*(?<!conn\.)(?<!connection\.)\b(credential|access_token|refresh_token|raw_token)\b[^}]*\}" \
               --include="*.py" \
               --exclude-dir=.git . ; then
            echo "::error::raw credential variable interpolated into log/print — forbidden (AGENTS.md)"; exit 1
          fi
          # Gating paths must stay model-free (ARCHITECTURE.md §2.1)
          if grep -nE "anthropic|openai|google\.generativeai|genai|vertexai" control-plane/app/kernel/services.py control-plane/app/kernel/optypes.py 2>/dev/null; then
            echo "::error::model SDK referenced inside a gating module — forbidden (§2.1)"; exit 1
          fi

  web:
    # Gates the Next.js console (control-plane/web) so the frontend can't merge broken.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: control-plane/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint check
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test
      - name: Production build
        run: npm run build
