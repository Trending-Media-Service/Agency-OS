name: wp-serverless-mysql
version: 0.1.0
description: Serverless WordPress on Cloud Run connected to dedicated Cloud SQL MySQL and GCS bucket
tier: dedicated
inputs:
  project_id: {type: string, required: true}
  custom_domain: {type: string, required: true}
  region: {type: string, default: asia-south1}
  db_tier: {type: string, default: db-f1-micro}
outputs: [service_url, db_instance_name, uploads_bucket]
cost_estimate_monthly: {amount_minor: 1200000, currency: INR}
severity: {impact: 3, reversibility: REVERSIBLE}
reversibility_map:
  cloud_run_service: REVERSIBLE
  mysql_instance: REVERSIBLE
  gcs_bucket: REVERSIBLE
policy_packs: [provision_cost_ceiling, statutory_region_lock]
checks: [http_200, db_reachable]
