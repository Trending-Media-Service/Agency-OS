name: n8n
version: 0.1.0
description: Deploy n8n workflow automation tool on Cloud Run with PostgreSQL backend
tier: shared
inputs:
  project_id: {type: string, required: true}
  region: {type: string, default: asia-south1}
  db_connection_name: {type: string, required: true}
  db_name: {type: string, required: true}
  db_user: {type: string, required: true}
  db_password: {type: string, required: true}
outputs: [service_url]
cost_estimate_monthly: {amount_minor: 300000, currency: INR}
severity: {impact: 2, reversibility: COMPENSATABLE}
reversibility_map:
  cloud_run_service: REVERSIBLE
policy_packs: [provision_cost_ceiling]
checks: [http_200]
